# Local development stack.
#
#   Full stack in containers:   docker compose up --build
#   Just Postgres (dev loop):   docker compose up -d db   then   ./mvnw spring-boot:run
#
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: buildlog
      POSTGRES_USER: app
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d buildlog"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/buildlog
      DB_USER: app
      DB_PASSWORD: localdev
    ports:
      - "8080:8080"

volumes:
  pgdata:
