spring:
  application:
    name: car-build-log
  # Local default points at the docker-compose Postgres. Every value is
  # overridable via env vars so the same build runs on the host, in a
  # container, or in prod (see application-prod.yml).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/buildlog}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:localdev}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

app:
  jwt:
    # Dev default only. MUST be overridden in production via the APP_JWT_SECRET env
    # var. HS256 requires a key of at least 32 bytes (256 bits).
    secret: ${APP_JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-key-0123456789}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
